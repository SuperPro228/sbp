<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOLKSWAGEN PASSAT</title>
    <style>
        :root {
            --vw-white: #FFFFFF;
            --vw-black: #000000;
        }

        /* --- ЗАГРУЗКА --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--vw-black);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-logo { width: 100px; margin-bottom: 20px; }
        .loader-bar { width: 300px; height: 3px; background: #222; position: relative; overflow: hidden; }
        .loader-progress { position: absolute; width: 0%; height: 100%; background: var(--vw-white); animation: progress 2s forwards; }
        @keyframes progress { 100% { width: 100%; } }
        .loaded #loader { opacity: 0; visibility: hidden; }

        /* --- БАЗОВЫЕ СТИЛИ --- */
        body, html {
            margin: 0; padding: 0;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: var(--vw-black);
            color: var(--vw-white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 30px 0;
            text-align: center;
            z-index: 1000;
        }
        header img { width: 50px; height: auto; }

        .section {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 1400px;
            opacity: 0;
            transform: translateY(60px);
            transition: opacity 1.5s cubic-bezier(0.2, 1, 0.3, 1), transform 1.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .content.appear {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- ШРИФТЫ --- */
        .title-ultra { font-size: 8rem; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 0.9; letter-spacing: -2px; }
        .title-huge { font-size: 6rem; font-weight: 800; text-transform: uppercase; margin: 0; line-height: 1; letter-spacing: -1px; }
        .desc-massive { font-size: 2.5rem; max-width: 1000px; line-height: 1.2; margin-top: 30px; font-weight: 400; }

        /* --- БЕЛАЯ КНОПКА ПЕРЕХОДА --- */
        .btn-white {
            display: inline-block;
            margin-top: 50px;
            padding: 20px 50px;
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--vw-black);
            background-color: var(--vw-white);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.2);
        }

        .btn-white:hover {
            transform: scale(1.07) translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 255, 255, 0.3);
            background-color: #f0f0f0;
        }

        .btn-pulse { animation: pulse-white 3s infinite; }
        @keyframes pulse-white {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.6); }
            70% { box-shadow: 0 0 0 25px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* ФОНЫ */
        .bg-4 { background-image: url('image_4.png'); }
        .bg-7 { background-image: url('image_7.png'); }
        .bg-6 { background-image: url('image_6.png'); }
        .bg-2 { background-image: url('image_2.png'); }
        .bg-5 { background-image: url('image_5.png'); }
        .bg-3 { background-image: url('image_3.png'); }

        footer {
            background-color: #080808;
            padding: 100px 60px;
            border-top: 1px solid #1a1a1a;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="image_1.png" class="loader-logo">
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <header>
        <img src="image_1.png">
    </header>

    <section class="section bg-4">
        <div class="overlay"></div>
        <div class="content">
            <div class="title-ultra">PASSAT</div>
            <div class="desc-massive">Инвестиция в комфорт</div>
            <a href="buy.html" class="btn-white btn-pulse">Купить сейчас</a>
        </div>
    </section>

    <section class="section bg-7">
        <div class="overlay"></div>
        <div class="content" style="text-align: left;">
            <div class="title-huge">СОЛИДНЫЙ</div>
            <div class="title-huge" style="color: rgba(255,255,255,0.4);">«ВЗГЛЯД»</div>
            <a href="buy.html" class="btn-white">Перейти к покупке</a>
        </div>
    </section>

    <section class="section bg-3">
        <div class="overlay"></div>
        <div class="content">
            <div class="title-ultra">КОМФОРТ</div>
            <div class="desc-massive">На первом месте</div>
            <a href="buy.html" class="btn-white">Оформить заказ</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2023 VOLKSWAGEN AG.</p>
    </footer>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('appear');
                }
            });
        }, { threshold: 0.2 });

        document.querySelectorAll('.content').forEach(box => observer.observe(box));

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.body.classList.add('loaded');
            }, 1000);
        });
    </script>
</body>
</html>
