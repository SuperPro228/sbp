<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Успешно</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root {
            --apple-green: #34c759;
            --bg-color: #000;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
        }

        /* Контейнер для иконки */
        .icon-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
        }

        /* Зеленый круг */
        .circle {
            width: 100px;
            height: 100px;
            background-color: var(--apple-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: circlePop 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49) both;
        }

        /* Галочка */
        .checkmark {
            width: 45px;
            height: 22px;
            border-left: 6px solid #fff;
            border-bottom: 6px solid #fff;
            transform: rotate(-45deg);
            margin-top: -8px;
            border-radius: 2px;
            animation: checkmarkIn 0.3s 0.4s cubic-bezier(0.17, 0.89, 0.32, 1.49) both;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 8px 0;
            letter-spacing: -0.5px;
            animation: fadeIn 0.5s 0.6s both;
        }

        p {
            color: #8e8e93;
            font-size: 17px;
            margin-top: 0;
            animation: fadeIn 0.5s 0.7s both;
        }

        /* Кнопка "Готово" внизу */
        .done-btn {
            position: absolute;
            bottom: 60px;
            background-color: #1c1c1e;
            color: #007aff;
            text-decoration: none;
            padding: 18px 0;
            width: 80%;
            max-width: 300px;
            text-align: center;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            transition: background-color 0.2s;
            animation: fadeIn 0.5s 0.8s both;
        }

        .done-btn:active {
            background-color: #2c2c2e;
            transform: scale(0.98);
        }

        /* Анимации */
        @keyframes circlePop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes checkmarkIn {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            100% { transform: scale(1) rotate(-45deg); opacity: 1; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="icon-container">
        <div class="circle">
            <div class="checkmark"></div>
        </div>
    </div>

    <h1>Готово</h1>
    <p>Оплата прошла успешно</p>

    <a href="apple_pay.html" class="done-btn">Готово</a>

    <script>
        // Вибрация (как на реальном Apple Pay)
        if (window.navigator && window.navigator.vibrate) {
            // Двойной легкий удар
            setTimeout(() => {
                window.navigator.vibrate([40, 30, 60]);
            }, 400);
        }

        // Блокируем свайп назад, чтобы пользователь не "платил" еще раз
        window.history.pushState(null, null, window.location.href);
        window.onpopstate = function () {
            window.history.go(1);
        };
    </script>
</body>
</html>
