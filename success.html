<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Pay</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --apple-blue: #007aff;
            --card-gray: #1c1c1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- КАРТА --- */
        .card-visual {
            width: 90%;
            max-width: 340px;
            height: 210px;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border-radius: 15px;
            margin-top: 40px;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-visual::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(110deg, transparent 60%, rgba(255,255,255,0.03) 60.5%, transparent 61%);
            border-radius: 15px;
        }

        .visa-logo-img { position: absolute; bottom: 15px; right: 20px; width: 60px; opacity: 0.95; }

        /* --- БЛОК СТАТУСА --- */
        .status-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* 1. СПИННЕР ЗАГРУЗКИ */
        .apple-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--text-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* 2. СИНЕЕ КОЛЬЦО (появляется после загрузки) */
        .check-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--apple-blue);
            display: none; /* Скрыто пока идет загрузка */
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.5);
            transform: scale(0.8);
            opacity: 0;
        }

        .check-ring svg {
            width: 35px;
            fill: none;
            stroke: var(--apple-blue);
            stroke-width: 3;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
        }

        /* КЛАССЫ АНИМАЦИИ */
        .processing .apple-spinner { display: none; }
        .processing .check-ring { 
            display: flex; 
            animation: ringPop 0.4s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .success .check-ring svg {
            animation: drawCheck 0.4s ease-out forwards;
        }

        @keyframes ringPop { 
            to { opacity: 1; transform: scale(1); } 
        }
        @keyframes drawCheck { 
            to { stroke-dashoffset: 0; } 
        }

        .done-text {
            margin-top: 15px;
            font-size: 17px;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .success .done-text { opacity: 1; }

        /* --- ИНФО СНИЗУ --- */
        .payment-info {
            width: 100%;
            padding: 20px 30px 40px;
            background: var(--card-gray);
            border-radius: 25px 25px 0 0;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .info-row { margin-bottom: 8px; display: flex; justify-content: space-between; }
        .info-highlight { color: #fff; font-weight: 600; font-size: 15px; }

    </style>
</head>
<body>

    <div class="card-visual">
        <div style="display: flex; align-items: center; gap: 10px;">
            <svg width="35" viewBox="0 0 24 24" fill="white"><path d="M2 2v20h20V2H2zm18 18H4V4h16v16zM6 6h4v4H6V6zm8 0h4v4h-4V6zm-8 8h4v4H6v-4zm8 0h4v4h-4v-4z"/></svg>
            <span style="font-weight: 700;">SAPPHIRE RESERVE</span>
        </div>
        <img src="visa_white.png" class="visa-logo-img">
    </div>

    <div class="status-container" id="statusBlock">
        <div class="apple-spinner" id="spinner"></div>
        <div class="check-ring">
            <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <div class="done-text">Done</div>
    </div>

    <footer class="payment-info">
        <div class="info-row"><span>Сайт:</span><strong style="color:#fff">superpro228.github.io</strong></div>
        <div class="info-row"><span>Услуга:</span><strong style="color:#fff">Бронирование VW Passat</strong></div>
        <div style="margin-top:15px; display:flex; justify-content:space-between; border-top:1px solid #333; padding-top:15px;">
            <span style="color:#fff">Итого:</span>
            <span class="info-highlight">1 250 000 ₽</span>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        var firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        window.onload = function() {
            const block = document.getElementById('statusBlock');

            // 1. Идет "загрузка" (1.5 сек)
            setTimeout(() => {
                block.classList.add('processing');
                
                // 2. Появляется синее кольцо и через миг - галочка
                setTimeout(() => {
                    block.classList.add('success');
                    
                    // 3. Отправляем сигнал в Firebase
                    firebase.database().ref('payment').set({ 
                        status: 'paid', 
                        time: Date.now() 
                    });
                }, 600);
            }, 1500); 
        };
    </script>
</body>
</html>
