<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Pay</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --apple-blue: #007aff;
            --card-gray: #1c1c1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- КАРТА (Появляется с задержкой) --- */
        .card-visual {
            width: 90%;
            max-width: 340px;
            height: 210px;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border-radius: 15px;
            margin-top: 40px;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .card-visual.show { opacity: 1; transform: translateY(0); }

        .card-visual::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(110deg, transparent 60%, rgba(255,255,255,0.03) 60.5%, transparent 61%);
            border-radius: 15px;
        }

        .visa-logo-img { position: absolute; bottom: 15px; right: 20px; width: 60px; opacity: 0.95; }

        /* --- ЦЕНТРАЛЬНЫЙ БЛОК --- */
        .status-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Спиннер */
        .apple-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--text-secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Кольцо успеха */
        .check-ring {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid var(--apple-blue);
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 122, 255, 0.4);
            transform: scale(0.5);
            opacity: 0;
        }

        .check-ring svg {
            width: 38px;
            fill: none;
            stroke: var(--apple-blue);
            stroke-width: 3.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
        }

        /* Состояния анимации */
        .anim-processing .apple-spinner { display: none; }
        .anim-processing .check-ring { 
            display: flex; 
            animation: ringPop 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.2) forwards;
        }

        .anim-success .check-ring svg {
            animation: drawCheck 0.5s ease-out forwards 0.2s;
        }

        @keyframes ringPop { to { opacity: 1; transform: scale(1); } }
        @keyframes drawCheck { to { stroke-dashoffset: 0; } }

        .done-text {
            margin-top: 20px;
            font-size: 19px;
            font-weight: 500;
            color: var(--text-primary);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .anim-success .done-text { opacity: 1; }

        /* --- ФУТЕР --- */
        .payment-info {
            width: 100%;
            padding: 25px 30px 45px;
            background: var(--card-gray);
            border-radius: 30px 30px 0 0;
            font-size: 13px;
            color: var(--text-secondary);
            transform: translateY(100%);
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .payment-info.show { transform: translateY(0); }

        .info-row { margin-bottom: 10px; display: flex; justify-content: space-between; }
        .info-highlight { color: #fff; font-weight: 600; font-size: 16px; }

    </style>
</head>
<body>

    <div class="card-visual" id="card">
        <div style="display: flex; align-items: center; gap: 10px;">
            <svg width="30" viewBox="0 0 24 24" fill="white"><path d="M2 2v20h20V2H2zm18 18H4V4h16v16zM6 6h4v4H6V6zm8 0h4v4h-4V6zm-8 8h4v4H6v-4zm8 0h4v4h-4v-4z"/></svg>
            <span style="font-weight: 700; font-size: 14px; letter-spacing: 0.5px;">SAPPHIRE RESERVE</span>
        </div>
        <img src="visa_white.png" class="visa-logo-img">
    </div>

    <div class="status-container" id="statusBlock">
        <div class="apple-spinner" id="spinner"></div>
        <div class="check-ring">
            <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <div class="done-text">Done</div>
    </div>

    <footer class="payment-info" id="footer">
        <div class="info-row"><span>Сайт</span><strong style="color:#fff">superpro228.github.io</strong></div>
        <div class="info-row"><span>Описание</span><strong style="color:#fff">VW Passat Reservation</strong></div>
        <div style="margin-top:15px; display:flex; justify-content:space-between; border-top:1px solid #2c2c2e; padding-top:15px; align-items: center;">
            <span style="color:#fff; font-size: 15px;">Сумма</span>
            <span class="info-highlight">1 250 000 ₽</span>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        var firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        window.onload = function() {
            const block = document.getElementById('statusBlock');
            const card = document.getElementById('card');
            const footer = document.getElementById('footer');
            const database = firebase.database();

            // ЭТАП 1: Появление интерфейса (0.3с)
            setTimeout(() => {
                card.classList.add('show');
                footer.classList.add('show');
            }, 300);

            // ЭТАП 2: Загрузка (спиннер крутится 1.8с)
            setTimeout(() => {
                block.classList.add('anim-processing');
                
                // ЭТАП 3: Успех (появление кольца и галочки)
                setTimeout(() => {
                    block.classList.add('anim-success');
                    
                    // ЭТАП 4: Отправка данных и отключение
                    database.ref('payment').set({ 
                        status: 'paid', 
                        time: Date.now() 
                    }).then(() => {
                        // Вырубаем соединение, чтобы телефон больше не слал данные
                        database.goOffline();
                        console.log("Оплата завершена. Соединение закрыто.");
                    });

                }, 500);
            }, 2100); 
        };
    </script>
</body>
</html>
