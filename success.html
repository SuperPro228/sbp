<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Apple Pay Success</title>
    <style>
        body {
            background: #000; color: #fff; font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; text-align: center;
        }
        /* Анимация круга */
        .circle {
            width: 100px; height: 100px; background: #34c759; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            animation: pop 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49);
        }
        .checkmark {
            width: 45px; height: 22px; border-left: 6px solid #fff;
            border-bottom: 6px solid #fff; transform: rotate(-45deg); margin-top: -8px;
        }
        .info { margin-top: 30px; animation: fadeIn 0.8s ease; }
        .amount { font-size: 32px; font-weight: 700; margin: 10px 0; }
        .card-info { color: #8e8e93; font-size: 17px; }
        .done-btn {
            position: absolute; bottom: 50px; background: #1c1c1e; color: #007aff;
            padding: 15px 80px; border-radius: 12px; text-decoration: none; font-weight: 600;
        }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="mainContent" style="display: none;">
        <div class="circle"><div class="checkmark"></div></div>
        <div class="info">
            <h1 style="font-size: 24px;">Оплачено</h1>
            <div class="amount" id="resAmount">0 ₽</div>
            <div class="card-info" id="resCard">Карта Wallet</div>
        </div>
        <a href="apple_pay.html" class="done-btn">Готово</a>
    </div>

    <div id="errorContent" style="display: none; color: #ff3b30; padding: 20px;">
        <h2>Ошибка доступа</h2>
        <p>Эта страница доступна только после совершения транзакции.</p>
        <a href="apple_pay.html" style="color: #007aff;">Вернуться в Wallet</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        
        // Получаем параметры из ссылки (например, ?amt=500&card=ID)
        const params = new URLSearchParams(window.location.search);
        const amt = params.get('amt');
        const cardId = params.get('card');

        if (amt && cardId) {
            // Если параметры есть, показываем контент и подтягиваем инфо о карте
            document.getElementById('mainContent').style.display = 'flex';
            document.getElementById('resAmount').innerText = Number(amt).toLocaleString() + ' ₽';
            
            firebase.database().ref('user_cards/' + cardId).once('value').then(snap => {
                if(snap.val()) {
                    document.getElementById('resCard').innerText = snap.val().name + ' •••• ' + snap.val().digits;
                }
            });

            if (window.navigator.vibrate) window.navigator.vibrate([40, 30, 60]);
        } else {
            // Если зашли просто по ссылке без данных — показываем ошибку
            document.getElementById('errorContent').style.display = 'block';
        }
    </script>
</body>
</html>
