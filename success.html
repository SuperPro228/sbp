<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обработка оплаты...</title>
    <style>
        :root {
            --vw-blue: #001e50;
            --success-green: #34c759;
            --bg: #f5f5f7;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        .container { text-align: center; width: 90%; max-width: 400px; }

        .loader-box { display: block; }

        .spinner {
            width: 80px; height: 80px;
            border: 6px solid rgba(0, 30, 80, 0.1);
            border-top: 6px solid var(--vw-blue);
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .success-box {
            display: none; opacity: 0;
            transform: scale(0.8);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .check-icon {
            width: 100px; height: 100px;
            background: var(--success-green);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(52, 199, 89, 0.3);
        }

        .check-icon svg { width: 50px; fill: white; }

        h1 { font-size: 2rem; margin: 0; color: #1d1d1f; }
        p { color: #86868b; font-size: 1.1rem; margin-top: 10px; line-height: 1.4; }

        .active { display: block; opacity: 1; transform: scale(1); }
    </style>
</head>
<body>

    <div class="container">
        <div id="loader" class="loader-box">
            <div class="spinner"></div>
            <h1>Обработка...</h1>
            <p>Связываемся с банком</p>
        </div>

        <div id="success" class="success-box">
            <div class="check-icon">
                <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <h1>Оплата принята</h1>
            <p>Ваш Volkswagen Passat успешно забронирован!</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Твоя ссылка Firebase
        var firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        window.addEventListener('load', () => {
            setTimeout(() => {
                // 1. Прячем лоадер и показываем успех
                document.getElementById('loader').style.display = 'none';
                const successBox = document.getElementById('success');
                successBox.classList.add('active');
                document.title = "Оплата подтверждена!";

                // 2. ОТПРАВЛЯЕМ СИГНАЛ НА КОМПЬЮТЕР
                firebase.database().ref('payment').set({ 
                    status: 'paid', 
                    timestamp: Date.now() 
                });
            }, 3000); 
        });
    </script>
</body>
</html>
