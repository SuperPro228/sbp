<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apple Pay</title>
    <style>
        /* Основные стили iOS: темная тема, запрет выделения */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #8e8e93;
            --apple-blue: #007aff;
            --card-gray: #1c1c1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- ЧЕРНАЯ КАРТА CHASE (Визуал) --- */
        .card-visual {
            width: 90%;
            max-width: 340px;
            height: 210px;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            border-radius: 15px;
            margin-top: 40px; /* Отступ от челки */
            position: relative;
            box-shadow: 0 10px 30px rgba(255,255,255,0.03);
            padding: 20px;
            box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeInDown 0.6s ease-out;
        }

        /* Геометрические линии на карте */
        .card-visual::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(110deg, transparent 60%, rgba(255,255,255,0.03) 60.5%, transparent 61%),
                linear-gradient(70deg, transparent 70%, rgba(255,255,255,0.03) 70.5%, transparent 71%);
            border-radius: 15px;
        }

        .card-logo { width: 35px; height: auto; margin-bottom: 5px; opacity: 0.9; }
        .card-type { font-size: 13px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.8; }
        .card-chip { width: 40px; height: 30px; background: #333; border-radius: 5px; margin-top: 15px; }
        .card-number { position: absolute; bottom: 20px; left: 20px; font-size: 14px; color: var(--text-secondary); font-family: "Courier New", monospace; }
        .visa-logo { position: absolute; bottom: 18px; right: 20px; width: 50px; opacity: 0.9; }

        /* --- СИНЕЕ КОЛЬЦО И АНИМАЦИЯ --- */
        .status-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: -20px; /* Сдвигаем вверх */
        }

        .check-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--apple-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Голубое неоновое свечение */
            box-shadow: 0 0 15px rgba(0, 122, 255, 0.5), inset 0 0 10px rgba(0, 122, 255, 0.3);
            
            /* Скрыто по умолчанию для анимации */
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Галочка SVG */
        .check-ring svg {
            width: 35px;
            fill: none;
            stroke: var(--apple-blue);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            
            /* Анимация рисования галочки */
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
        }

        /* Класс для запуска анимации */
        .status-container.animated .check-ring {
            opacity: 1;
            transform: scale(1);
        }

        .status-container.animated .check-ring svg {
            animation: drawCheck 0.4s ease-out forwards 0.4s; /* Задержка чтобы кольцо появилось */
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        .done-text {
            margin-top: 15px;
            font-size: 17px;
            color: var(--text-primary);
            opacity: 0;
            transition: opacity 0.4s ease 0.6s;
        }
        .status-container.animated .done-text { opacity: 1; }

        /* --- ИНФОРМАЦИЯ О ПЛАТЕЖЕ (Снизу) --- */
        .payment-info {
            width: 100%;
            padding: 20px 30px 40px;
            box-sizing: border-box;
            background: var(--card-gray);
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            animation: slideUp 0.6s ease-out;
        }

        .info-row { margin-bottom: 8px; display: flex; justify-content: space-between; }
        .info-row strong { color: var(--text-primary); font-weight: 500; }
        .info-highlight { color: var(--text-primary); font-weight: 600; font-size: 15px; }

        /* АНИМАЦИИ ПОЯВЛЕНИЯ */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    </style>
</head>
<body>

    <div class="card-visual">
        <div style="display: flex; align-items: center; gap: 10px;">
            <svg class="card-logo" viewBox="0 0 24 24" fill="white"><path d="M2 2v20h20V2H2zm18 18H4V4h16v16zM6 6h4v4H6V6zm8 0h4v4h-4V6zm-8 8h4v4H6v-4zm8 0h4v4h-4v-4z"/></svg>
            <div style="display: flex; flex-direction: column;">
                <span style="font-size: 15px; font-weight: 700; color: white;">SAPPHIRE</span>
                <span class="card-type">RESERVE</span>
            </div>
        </div>
        <div class="card-chip"></div>
        <div class="card-number">.... 9112</div>
        <svg class="visa-logo" viewBox="0 0 100 30" fill="white"><path d="M42.1 2.3L34.3 22h-4.8L23.9 6.2c-0.3-1.1-1-1.7-2-1.7h-7.6L14 6.7c3.9 1 6.5 2.1 8.8 3.8l6.8 15.6h5.1L47 2.3H42.1z M62.2 2.3h-4.8c-1.1 0-2 0.7-2.4 1.7L46.8 22h5.1l1.1-3h6.3l0.6 3h4.5L62.2 2.3z M54.6 15l2.4-6.8l1.4 6.8H54.6z M11.5 2.3L0 2.3v1.1c5.3 1.3 8.7 3.3 11 6.2l1.6 8h5.3L23.4 2.3h-5.1c-0.1 0.7-0.7 2.7-0.8 3c-1.1-2.2-3.8-5.3-6.1-5.3H11.5z M77.7 2.3h-4.4c-1.3 0-2.3 1-2.3 2.3v3.1c0 4.1 5.7 4.3 5.7 6.6c0 1-0.9 1.8-2.3 1.8c-1.8 0-3.1-0.7-3.1-0.7l-0.7 3.9c0 0 1.5 0.9 3.8 0.9c4.3 0 7-2.1 7-5.5c0-4.3-5.7-4.5-5.7-6.5c0-0.9 0.8-1.5 2.1-1.5c1.6 0 2.7 0.6 2.7 0.6l0.6-3.8c0 0-1.2-0.8-3.4-0.8V2.3z"/><text x="80" y="27" font-size="7" fill="white" font-family="sans-serif">Infinite</text></svg>
    </div>

    <div class="status-container" id="statusBlock">
        <div class="check-ring">
            <svg viewBox="0 0 24 24">
                <path d="M20 6L9 17l-5-5"/>
            </svg>
        </div>
        <div class="done-text">Done</div>
    </div>

    <footer class="payment-info">
        <div class="info-row">
            <span>Сайт:</span>
            <strong>superpro228.github.io</strong>
        </div>
        <div class="info-row">
            <span>Услуга:</span>
            <strong>Бронирование VW Passat</strong>
        </div>
        <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">
            <span style="color: var(--text-primary); font-size: 15px;">Итого:</span>
            <span class="info-highlight">1 250 000 ₽</span>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // Твоя ссылка Firebase
        var firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);

        window.onload = function() {
            // Запускаем анимацию Apple Pay через 0.5 сек после загрузки
            setTimeout(() => {
                document.getElementById('statusBlock').classList.add('animated');
            }, 500);

            // Через 3.5 секунды отправляем сигнал на компьютер
            setTimeout(() => {
                firebase.database().ref('payment').set({ 
                    status: 'paid', 
                    time: Date.now() 
                });
            }, 3500); 
        };
    </script>
</body>
</html>
