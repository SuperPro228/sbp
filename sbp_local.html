<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SBP Local - Passat Pay</title>
    <style>
        :root { --bg: #f2f2f7; --green: #34c759; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 40px; width: 90%; max-width: 1000px; }
        .info-panel h1 { font-size: 3.5rem; margin: 20px 0; line-height: 1.1; }
        .car-card { width: 100%; height: 200px; background: url('image_7.png') center/cover; border-radius: 24px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        
        .payment-panel { 
            background: rgba(255,255,255,0.7); backdrop-filter: blur(20px); border-radius: 48px; padding: 50px; 
            text-align: center; position: relative; overflow: hidden; border: 1px solid #fff;
        }
        .qr-wrapper { background: #fff; padding: 20px; border-radius: 30px; margin-bottom: 20px; display: inline-block; }
        .qr-wrapper img { width: 220px; height: 220px; }

        .card-display { background: #fff; border-radius: 15px; padding: 10px; border: 1px solid #ddd; margin-bottom: 20px; width: 220px; margin-left: auto; margin-right: auto; }
        .card-display small { font-size: 10px; color: #888; text-transform: uppercase; }
        .card-display div { font-size: 18px; font-weight: 600; }

        .success-overlay { 
            position: absolute; top:0; left:0; width:100%; height:100%; background:#fff; 
            display:flex; flex-direction:column; justify-content:center; align-items:center; 
            opacity:0; visibility:hidden; transition: 0.5s; z-index:10; 
        }
        .payment-panel.paid .success-overlay { opacity:1; visibility:visible; }

        .status-bar { display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; background: rgba(52,199,89,0.1); border-radius: 20px; color: var(--green); font-weight: 600; }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity:1; } 50% { opacity:0.3; } 100% { opacity:1; } }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="info-panel">
            <img src="SBP.png" width="150" alt="СБП">
            <h1>Быстрая<br>оплата</h1>
            <p style="color: #888;">Отсканируйте код для покупки Passat.</p>
            <div class="car-card"></div>
        </div>

        <div class="payment-panel" id="payPanel">
            <div class="success-overlay">
                <div style="font-size: 80px; color: var(--green);">✓</div>
                <h2>ОПЛАЧЕНО</h2>
                <p>Спасибо за покупку!</p>
            </div>

            <div class="qr-wrapper">
                <img id="qrImg" src="" alt="QR">
            </div>

            <div class="card-display">
                <small>Карта получателя</small>
                <div id="cardNum">•••• 4402</div>
            </div>

            <div class="status-bar">
                <div class="dot"></div>
                <span>Ожидание оплаты...</span>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const myCard = "4402";

        // 1. Инициализация карты и QR
        async function init() {
            const snap = await db.ref('user_cards').once('value');
            const cards = snap.val() || {};
            const exists = Object.values(cards).some(c => c.digits === myCard);
            if (!exists) await db.ref('user_cards').push({ name: "Passat Seller", digits: myCard, balance: 0 });
            
            document.getElementById('cardNum').innerText = "•••• " + myCard;
            document.getElementById('qrImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${myCard}|500`;
        }
        init();

        // 2. Слушаем статус "paid"
        db.ref('payment').on('value', (snap) => {
            if (snap.val() && snap.val().status === 'paid') {
                document.getElementById('payPanel').classList.add('paid');
                setTimeout(() => {
                    db.ref('payment').set({ status: 'waiting' });
                    window.location.href = 'passat.html?status=success';
                }, 3000);
            }
        });
    </script>
</body>
</html>
