<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Оплата заказа</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #amountDisplay { font-size: 48px; font-weight: 700; margin: 40px 0 20px; }
        .box { background: #1c1c1e; border-radius: 14px; width: 100%; padding: 15px; box-sizing: border-box; margin-bottom: 12px; }
        label { color: #8e8e93; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        select, input { background: none; border: none; color: #fff; font-size: 17px; width: 100%; outline: none; }
        .receiver-info { color: #007aff; font-weight: 500; font-size: 14px; margin-top: 4px; }
        .pay-btn { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 17px; font-weight: 600; margin-top: 30px; transition: 0.2s; }
        .pay-btn:disabled { background: #333; color: #8e8e93; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="amountDisplay">0 ₽</div>

    <div class="box">
        <label>Списать с моей карты</label>
        <select id="cardSelect" onchange="validate()">
            <option value="">Загрузка карт...</option>
        </select>
    </div>

    <div class="box">
        <label>Получатель (ID)</label>
        <input type="number" id="targetInput" readonly>
        <div id="receiverName" class="receiver-info">Поиск...</div>
    </div>

    <div class="box">
        <label>Сумма</label>
        <input type="number" id="priceInput" oninput="validate()">
    </div>

    <button id="payBtn" class="pay-btn" onclick="executePayment()" disabled>Подтвердить оплату</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allData = {};

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            document.getElementById('targetInput').value = params.get('target') || "";
            document.getElementById('priceInput').value = params.get('amount') || "";
            
            db.ref('user_cards').on('value', (snap) => {
                allData = snap.val() || {};
                updateUI(params.get('target'));
            });
        };

        function updateUI(target) {
            const select = document.getElementById('cardSelect');
            select.innerHTML = '<option value="">Выберите карту</option>';
            let rName = "Не найден";
            for (let id in allData) {
                const card = allData[id];
                const opt = document.createElement('option');
                opt.value = id;
                opt.textContent = `${card.name} (•••• ${card.digits}) — ${card.balance} ₽`;
                select.appendChild(opt);
                if (card.digits === target) rName = card.name;
            }
            document.getElementById('receiverName').innerText = rName;
            validate();
        }

        function validate() {
            const amt = parseFloat(document.getElementById('priceInput').value) || 0;
            const cardId = document.getElementById('cardSelect').value;
            document.getElementById('amountDisplay').innerText = amt.toLocaleString() + ' ₽';
            document.getElementById('payBtn').disabled = !(cardId && amt > 0 && allData[cardId].balance >= amt);
        }

        async function executePayment() {
            const myId = document.getElementById('cardSelect').value;
            const targetDigits = document.getElementById('targetInput').value;
            const amt = parseFloat(document.getElementById('priceInput').value);
            
            let targetId = Object.keys(allData).find(id => allData[id].digits === targetDigits);

            if (targetId) {
                // 1. Меняем балансы
                await db.ref('user_cards/' + myId).update({ balance: allData[myId].balance - amt });
                await db.ref('user_cards/' + targetId).update({ balance: (allData[targetId].balance || 0) + amt });

                // 2. СИГНАЛ НА МОНИТОР (ВАЖНО!)
                await db.ref('payment').set({ status: 'paid' });

                // 3. Успех на телефоне
                window.location.href = `success.html?amt=${amt}&card=${myId}`;
            }
        }
    </script>
</body>
</html>
