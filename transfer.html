<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перевод</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; }
        .input-group { background: #1c1c1e; border-radius: 14px; padding: 10px 20px; margin-top: 40px; }
        input { width: 100%; background: none; border: none; color: #fff; padding: 15px 0; font-size: 18px; border-bottom: 0.5px solid #333; outline: none; }
        input:last-child { border: none; }
        .send-btn { width: 100%; background: #fff; color: #000; border: none; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 600; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Перевод</h1>
    <div class="input-group">
        <input type="number" id="cardNum" placeholder="Номер карты (4 цифры)">
        <input type="number" id="amount" placeholder="Сумма перевода">
    </div>
    <button class="send-btn" onclick="sendMoney()">Отправить</button>
    <a href="apple_pay.html" style="display:block; text-align:center; color:#8e8e93; margin-top:20px; text-decoration:none;">Отмена</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const myUser = localStorage.getItem('walletUser');

        async function sendMoney() {
            const cardNum = document.getElementById('cardNum').value;
            const amount = parseFloat(document.getElementById('amount').value);

            if(!cardNum || !amount) return alert("Заполните поля");

            // Ищем юзера с такой картой
            const usersSnap = await db.ref('users').once('value');
            let targetUser = null;

            usersSnap.forEach(u => {
                const data = u.val();
                if(data.cards) {
                    Object.values(data.cards).forEach(c => {
                        if(c.digits == cardNum) targetUser = u.key;
                    });
                }
            });

            if(!targetUser) return alert("Карта не найдена");

            // Логика списания/начисления
            const mySnap = await db.ref('users/' + myUser).once('value');
            if(mySnap.val().balance < amount) return alert("Нет денег");

            await db.ref('users/' + myUser).update({ balance: mySnap.val().balance - amount });
            const tSnap = await db.ref('users/' + targetUser).once('value');
            await db.ref('users/' + targetUser).update({ balance: (tSnap.val().balance || 0) + amount });

            alert("Перевод выполнен!");
            window.location.href = 'apple_pay.html';
        }
    </script>
</body>
</html>
