<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Оплата заказа</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #amountDisplay { font-size: 44px; font-weight: 700; margin: 40px 0 20px; }
        .box { background: #1c1c1e; border-radius: 14px; width: 100%; padding: 15px; box-sizing: border-box; margin-bottom: 12px; }
        label { color: #8e8e93; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: 600; }
        select, input { background: none; border: none; color: #fff; font-size: 17px; width: 100%; outline: none; }
        .receiver-info { color: #007aff; font-size: 14px; margin-top: 4px; }
        .pay-btn { background: #fff; color: #000; border: none; width: 100%; padding: 18px; border-radius: 14px; font-size: 17px; font-weight: 600; margin-top: 30px; transition: 0.2s; }
        .pay-btn:disabled { background: #333; color: #8e8e93; opacity: 0.6; }
    </style>
</head>
<body>

    <div id="amountDisplay">0 ₽</div>

    <div class="box">
        <label>Мой кошелек</label>
        <select id="cardSelect" onchange="validate()">
            <option value="">Загрузка карт...</option>
        </select>
    </div>

    <div class="box">
        <label>Магазин (Карта)</label>
        <input type="number" id="targetInput" readonly>
        <div id="receiverName" class="receiver-info">Passat Store Официальный</div>
    </div>

    <div class="box">
        <label>К оплате</label>
        <input type="number" id="priceInput" readonly>
    </div>

    <button id="payBtn" class="pay-btn" onclick="execute()" disabled>Оплатить заказ</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myCards = {};

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const t = params.get('target');
            const a = params.get('amount');
            
            if (t) document.getElementById('targetInput').value = t;
            if (a) {
                document.getElementById('priceInput').value = a;
                document.getElementById('amountDisplay').innerText = parseFloat(a).toLocaleString() + ' ₽';
            }
            
            db.ref('user_cards').on('value', (snap) => {
                myCards = snap.val() || {};
                const select = document.getElementById('cardSelect');
                select.innerHTML = '<option value="">Выберите карту</option>';
                for (let id in myCards) {
                    const c = myCards[id];
                    const opt = document.createElement('option');
                    opt.value = id;
                    opt.textContent = `${c.name} (•••• ${c.digits}) — ${c.balance} ₽`;
                    select.appendChild(opt);
                }
                validate();
            });
        };

        function validate() {
            const amt = parseFloat(document.getElementById('priceInput').value) || 0;
            const cardId = document.getElementById('cardSelect').value;
            const display = document.getElementById('amountDisplay');
            if (cardId && myCards[cardId]) {
                const enough = myCards[cardId].balance >= amt;
                display.style.color = enough ? "#34c759" : "#ff3b30";
                document.getElementById('payBtn').disabled = !enough;
            }
        }

        async function execute() {
            const myId = document.getElementById('cardSelect').value;
            const storeDigits = document.getElementById('targetInput').value;
            const amt = parseFloat(document.getElementById('priceInput').value);
            const btn = document.getElementById('payBtn');

            btn.disabled = true;
            btn.innerText = "Обработка...";

            // Ищем карту магазина в базе
            const snap = await db.ref('user_cards').once('value');
            const all = snap.val() || {};
            const storeId = Object.keys(all).find(id => all[id].digits === storeDigits);

            if (storeId) {
                // Двойное обновление баланса
                await db.ref('user_cards/' + myId).update({ balance: myCards[myId].balance - amt });
                await db.ref('user_cards/' + storeId).update({ balance: (all[storeId].balance || 0) + amt });

                // ОТПРАВЛЯЕМ СИГНАЛ НА МОНИТОР
                await db.ref('payment_sync').set({ status: 'paid', timestamp: Date.now() });

                // Переход на успех
                window.location.href = `success.html?amt=${amt}`;
            } else {
                alert("Ошибка: Карта магазина не найдена в базе");
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
