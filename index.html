<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple ID Login</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { background: #1c1c1e; padding: 30px; border-radius: 20px; width: 100%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: none; background: #2c2c2e; color: #fff; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #fff; color: #000; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 16px; }
        .toggle { color: #007aff; font-size: 14px; margin-top: 15px; cursor: pointer; display: block; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1 id="title" style="margin-top:0">Apple ID</h1>
        <input type="text" id="user" placeholder="Имя пользователя">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="auth()" id="btn">Войти</button>
        <span class="toggle" onclick="toggleMode()" id="toggleText">Нет аккаунта? Создать</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let isLogin = true;

        function toggleMode() {
            isLogin = !isLogin;
            document.getElementById('title').innerText = isLogin ? "Apple ID" : "Регистрация";
            document.getElementById('btn').innerText = isLogin ? "Войти" : "Создать";
            document.getElementById('toggleText').innerText = isLogin ? "Нет аккаунта? Создать" : "Уже есть аккаунт? Войти";
        }

        async function auth() {
            const user = document.getElementById('user').value.trim().toLowerCase();
            const pass = document.getElementById('pass').value;
            if (!user || !pass) return;

            if (isLogin) {
                const snap = await db.ref('users/' + user).once('value');
                const data = snap.val();
                if (snap.exists() && data.pass === pass) {
                    localStorage.setItem('walletUser', user);
                    window.location.href = 'apple_pay.html';
                } else { alert("Ошибка входа: проверьте данные"); }
            } else {
                const walletID = Math.floor(1000 + Math.random() * 9000);
                await db.ref('users/' + user).set({ pass, balance: 10000, walletID });
                alert("Аккаунт успешно создан!");
                toggleMode();
            }
        }
    </script>
</body>
</html>
