<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оформление заказа — Passat</title>
    <style>
        :root {
            --vw-white: #FFFFFF;
            --vw-black: #000000;
        }

        /* --- ЗАГРУЗКА --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--vw-black);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--vw-white);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loaded #loader { opacity: 0; visibility: hidden; }

        /* --- МОДАЛЬНОЕ ОКНО СБП --- */
        #sbp-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }
        .modal-content {
            background: #1c1c1e;
            padding: 50px;
            border-radius: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .modal-active .modal-content { transform: scale(1); }
        
        /* Исправленный логотип */
        .sbp-logo-modal { 
            width: 140px; 
            margin-bottom: 30px; 
            filter: brightness(1.1); /* Чтобы лого на темном фоне было сочнее */
        }

        /* --- СТИЛИ КОНТЕНТА --- */
        body, html {
            margin: 0; padding: 0;
            font-family: -apple-system, sans-serif;
            background-color: var(--vw-black);
            color: var(--vw-white);
        }

        header { padding: 40px; }
        .back-btn { color: #fff; text-decoration: none; opacity: 0.5; transition: 0.3s; }
        .back-btn:hover { opacity: 1; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }

        .hero-title {
            font-size: 8rem; font-weight: 900; line-height: 0.85; letter-spacing: -4px;
            margin-bottom: 40px;
        }

        .car-preview {
            width: 100%; height: 55vh;
            background: url('image_7.png') center/cover;
            border-radius: 40px; margin-bottom: 60px;
        }

        .form-box { max-width: 500px; }
        .form-box h2 { font-size: 3rem; margin-bottom: 30px; }
        
        input {
            width: 100%; padding: 25px; margin-bottom: 15px;
            background: #0f0f0f; border: 1px solid #222;
            border-radius: 20px; color: #fff; font-size: 1.1rem;
            box-sizing: border-box;
        }

        .btn-pay {
            width: 100%; padding: 25px; background: #fff; color: #000;
            border: none; border-radius: 20px; font-size: 1.2rem;
            font-weight: bold; cursor: pointer; transition: 0.4s;
            margin-top: 20px;
        }
        .btn-pay:hover { transform: scale(0.98); }

        footer { padding: 60px; text-align: center; color: #333; }
    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>

    <div id="sbp-modal">
        <div class="modal-content">
            <img src="SBP.png" class="sbp-logo-modal" alt="Логотип СБП">
            <h3 style="font-size: 1.8rem; margin-bottom: 10px;">Оплата СБП</h3>
            <p style="color: #888; margin-bottom: 35px;">Переход на защищенную страницу оплаты...</p>
            <div class="spinner" style="margin: 0 auto; width: 25px; height: 25px; border-width: 2px;"></div>
        </div>
    </div>

    <header>
        <a href="passat.html" class="back-btn">← К ОБЗОРУ</a>
    </header>

    <div class="container">
        <div class="hero-title">ВАШ<br>PASSAT</div>
        <div class="car-preview"></div>

        <div class="form-box">
            <h2>Оформить</h2>
            <input type="text" placeholder="Имя">
            <input type="tel" placeholder="+7 (___) ___-__-__">
            <button class="btn-pay" onclick="startPayment()">Оплатить через СБП</button>
            
            <div style="display: flex; align-items: center; gap: 15px; margin-top: 30px; opacity: 0.4;">
                <img src="SBP.png" style="width: 50px;" alt="СБП">
                <span style="font-size: 0.8rem;">Безопасный платеж через систему быстрых платежей</span>
            </div>
        </div>
    </div>

    <footer>&copy; 2023 VOLKSWAGEN AG</footer>

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => { document.body.classList.add('loaded'); }, 600);
        });

        function startPayment() {
            const modal = document.getElementById('sbp-modal');
            modal.style.display = 'flex';
            setTimeout(() => { modal.classList.add('modal-active'); }, 50);

            // Перенаправление на твой новый sbp_local.html
            setTimeout(() => {
                window.location.href = "sbp_local.html"; 
            }, 2500);
        }
    </script>
</body>
</html>
