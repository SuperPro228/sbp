<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apple Wallet</title>
    <style>
        :root { --bg: #000; --apple-blue: #007aff; --card-gray: #1c1c1e; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            padding: 0 16px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }
        header { padding: 60px 0 20px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.8s ease-out; }
        h1 { font-size: 34px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .add-btn { color: var(--apple-blue); font-size: 28px; text-decoration: none; transition: 0.2s; }
        
        .cash-card {
            background: #fff; border-radius: 14px; padding: 20px; color: #000;
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(255,255,255,0.05);
            animation: springUp 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cash-label { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; }
        .cash-amount { font-size: 34px; font-weight: 700; margin-top: 5px; }

        #cardsList { display: flex; flex-direction: column; gap: 12px; }
        .card-row {
            background: var(--card-gray); border-radius: 14px; padding: 14px 16px;
            display: flex; align-items: center; cursor: pointer;
            transition: 0.3s; animation: springUp 0.8s backwards;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .card-thumb { width: 52px; height: 33px; border-radius: 6px; margin-right: 15px; }
        .sapphire-bg { background: linear-gradient(135deg, #0b1a30 0%, #000 100%); }
        .gold-bg { background: linear-gradient(135deg, #d4af37 0%, #8a6d1d 100%); }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            display: none; z-index: 1000; align-items: flex-end;
        }
        .action-sheet {
            width: 100%; background: #1c1c1e; border-radius: 20px 20px 0 0;
            padding: 25px 20px 45px; box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.15, 1, 0.3, 1);
        }
        body.modal-open .overlay { display: flex; }
        body.modal-open .action-sheet { transform: translateY(0); }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-item {
            background: #2c2c2e; border-radius: 14px; padding: 18px;
            text-decoration: none; color: #fff; text-align: center; font-weight: 600;
        }
        .btn-cancel { width: 100%; background: #333; color: #fff; border: none; padding: 16px; border-radius: 14px; margin-top: 10px; }

        @keyframes springUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body">
    <header>
        <h1 id="headerTitle">Wallet</h1>
        <a href="register_card.html" class="add-btn">⊕</a>
    </header>

    <div class="cash-card">
        <div class="cash-label">Apple Cash</div>
        <div id="totalBalance" class="cash-amount">0 ₽</div>
    </div>

    <div id="cardsList"></div>

    <div class="overlay" onclick="closeMenu()">
        <div class="action-sheet" onclick="event.stopPropagation()">
            <div id="sheetTitle" style="text-align:center; color:#8e8e93; margin-bottom:25px;"></div>
            <div class="action-grid">
                <a href="qr_pay.html" class="action-item">📷 QR-код</a>
                <a href="transfer.html" class="action-item">💸 Перевести</a>
            </div>
            <button onclick="closeMenu()" class="btn-cancel">Закрыть</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. ПОЛУЧАЕМ ТЕКУЩЕГО ЮЗЕРА (из того, что мы делали вчера)
        const currentUser = localStorage.getItem('walletUser');

        if (!currentUser) {
            window.location.href = 'index.html'; // Если не вошел — на вход
        } else {
            document.getElementById('headerTitle').innerText = 'Apple Pay';
        }

        // 2. СЛУШАЕМ ДАННЫЕ ТОЛЬКО ЭТОГО ПОЛЬЗОВАТЕЛЯ
        db.ref('users/' + currentUser).on('value', (snapshot) => {
            const userData = snapshot.val();
            if (!userData) return;

            const list = document.getElementById('cardsList');
            list.innerHTML = '';
            
            // Если у юзера есть баланс в объекте пользователя
            const balance = userData.balance || 0;
            document.getElementById('totalBalance').innerText = balance.toLocaleString() + ' ₽';

            // Если ты хранишь КАРТЫ внутри пользователя (правильный подход):
            if (userData.cards) {
                let index = 0;
                for (let id in userData.cards) {
                    const card = userData.cards[id];
                    const delay = index * 0.08;
                    list.innerHTML += `
                        <div class="card-row" onclick="openMenu('${card.name}', '${card.digits}')" style="animation-delay: ${delay}s">
                            <div class="card-thumb sapphire-bg"></div>
                            <div style="flex:1">
                                <div style="font-weight:600; font-size:17px;">${card.name}</div>
                                <div style="color:#8e8e93; font-size:14px;">•••• ${card.digits}</div>
                            </div>
                        </div>`;
                    index++;
                }
            } else {
                // Если карт нет, просто показываем Apple Cash
                list.innerHTML = '<div style="text-align:center; color:#333; margin-top:20px;">Нет активных карт</div>';
            }
        });

        function openMenu(name, digits) {
            document.getElementById('sheetTitle').innerText = name + ' •••• ' + digits;
            document.getElementById('body').classList.add('modal-open');
        }

        function closeMenu() { document.getElementById('body').classList.remove('modal-open'); }
    </script>
</body>
</html>
