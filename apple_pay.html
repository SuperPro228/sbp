<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Apple Wallet</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --bg: #000; --apple-blue: #007aff; --card-gray: #1c1c1e; --apple-red: #ff3b30; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            padding: 0 16px; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }
        header { padding: 60px 0 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 34px; font-weight: 700; margin: 0; letter-spacing: -0.5px; }
        .add-btn { color: var(--apple-blue); font-size: 28px; text-decoration: none; cursor: pointer; }
        
        .cash-card {
            background: #fff; border-radius: 14px; padding: 20px; color: #000;
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(255,255,255,0.05);
            animation: springUp 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cash-label { font-size: 13px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .cash-amount { font-size: 34px; font-weight: 700; margin-top: 5px; letter-spacing: -1px; }

        #cardsList { display: flex; flex-direction: column; gap: 12px; }
        .card-row {
            background: var(--card-gray); border-radius: 14px; padding: 14px 16px;
            display: flex; align-items: center; cursor: pointer;
            transition: 0.3s; animation: springUp 0.8s backwards;
            border: 1px solid rgba(255,255,255,0.03);
        }
        .card-row:active { transform: scale(0.96); background: #2c2c2e; }
        .card-thumb { 
            width: 52px; height: 33px; border-radius: 6px; margin-right: 15px; 
            background: linear-gradient(135deg, #2c2c2e, #000);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Сканер (на весь экран) */
        #reader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2000; display: none; background: #000; 
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; z-index: 1000; align-items: flex-end;
        }
        .action-sheet {
            width: 100%; background: #1c1c1e; border-radius: 20px 20px 0 0;
            padding: 25px 20px 45px; box-sizing: border-box;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.15, 1, 0.3, 1);
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        body.modal-open .overlay { display: flex; }
        body.modal-open .action-sheet { transform: translateY(0); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .action-item {
            background: #2c2c2e; border-radius: 14px; padding: 18px;
            text-decoration: none; color: #fff; text-align: center; font-weight: 600;
        }
        .btn-delete { 
            width: 100%; background: rgba(255, 59, 48, 0.15); color: var(--apple-red); 
            border: none; padding: 16px; border-radius: 14px; margin-top: 20px; 
            font-weight: 600; font-size: 17px; cursor: pointer;
        }
        .btn-cancel { width: 100%; background: #333; color: #fff; border: none; padding: 16px; border-radius: 14px; margin-top: 10px; font-weight: 600; }

        @keyframes springUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body">
    <div id="reader"></div>

    <header>
        <h1 id="userHeader">Wallet</h1>
        <a href="register.html" class="add-btn">⊕</a>
    </header>

    <div class="cash-card">
        <div class="cash-label">Apple Cash</div>
        <div id="totalBalance" class="cash-amount">0 ₽</div>
    </div>

    <div id="cardsList"></div>

    <div class="overlay" onclick="closeMenu()">
        <div class="action-sheet" onclick="event.stopPropagation()">
            <div id="sheetTitle" style="text-align:center; color:#8e8e93; margin-bottom:25px; font-size: 14px;"></div>
            <div class="action-grid">
                <div class="action-item" onclick="startScan()" style="cursor:pointer">📷 Сканировать</div>
                <a href="qr_pay.html" class="action-item">📲 Мой QR</a>
                <a href="transfer.html" class="action-item" style="grid-column: span 2;">💳 Перевод по номеру</a>
            </div>
            
            <button class="btn-delete" id="deleteBtn">Удалить карту</button>
            <button onclick="closeMenu()" class="btn-cancel">Отмена</button>
            <button onclick="logout()" style="background:none; border:none; color:#555; width:100%; margin-top:25px; font-size:12px;">Выйти из аккаунта</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = localStorage.getItem('walletUser');
        let selectedCardId = null;

        if (!user) {
            window.location.href = 'index.html';
        } else {
            document.getElementById('userHeader').innerText = user.charAt(0).toUpperCase() + user.slice(1);
        }

        db.ref('users/' + user).on('value', (snap) => {
            const data = snap.val();
            if (!data) return;

            document.getElementById('totalBalance').innerText = (data.balance || 0).toLocaleString() + ' ₽';
            const list = document.getElementById('cardsList');
            list.innerHTML = '';

            if (data.cards) {
                Object.keys(data.cards).forEach((id, index) => {
                    const card = data.cards[id];
                    list.innerHTML += `
                        <div class="card-row" onclick="openMenu('${card.name}', '${card.digits}', '${id}')" style="animation-delay: ${index * 0.08}s">
                            <div class="card-thumb"></div>
                            <div style="flex:1">
                                <div style="font-weight:600; font-size:17px;">${card.name}</div>
                                <div style="color:#8e8e93; font-size:14px;">•••• ${card.digits}</div>
                            </div>
                        </div>
                    `;
                });
            }
        });

        function openMenu(name, digits, id) {
            selectedCardId = id;
            document.getElementById('sheetTitle').innerText = name + ' •••• ' + digits;
            document.getElementById('body').classList.add('modal-open');
        }

        function closeMenu() { document.getElementById('body').classList.remove('modal-open'); }

        // Вернул функцию сканирования QR
        function startScan() {
            closeMenu();
            const readerDiv = document.getElementById('reader');
            readerDiv.style.display = 'block';
            
            const html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                html5QrCode.stop().then(() => {
                    readerDiv.style.display = 'none';
                    // Если это перевод человеку
                    if (decodedText.includes('USER:')) {
                        const target = decodedText.split('USER:')[1];
                        window.location.href = `transfer.html?target=USER:${target}`;
                    } else {
                        // Если это оплата магазину
                        window.location.href = `transfer.html?target=${decodedText}`;
                    }
                });
            });
        }
        
        document.getElementById('deleteBtn').onclick = async function() {
            if (selectedCardId && confirm("Удалить эту карту из Wallet?")) {
                const userRef = db.ref('users/' + user);
                const userSnap = await userRef.once('value');
                const userData = userSnap.val();
                const cardToRemove = userData.cards[selectedCardId];
                const cardBalance = parseFloat(cardToRemove.balance) || 0;
                const currentTotal = parseFloat(userData.balance) || 0;

                await userRef.update({ balance: currentTotal - cardBalance });
                await db.ref('users/' + user + '/cards/' + selectedCardId).remove();
                closeMenu();
            }
        };

        function logout() { 
            localStorage.removeItem('walletUser'); 
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
