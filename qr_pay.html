<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Сканер QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { 
            background: #000; margin: 0; color: #fff; 
            font-family: -apple-system, sans-serif; overflow: hidden; 
        }
        #reader { width: 100%; height: 100vh; }
        
        /* Рамка сканера */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: 60px solid rgba(0,0,0,0.6); box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .scanner-frame { 
            width: 260px; height: 260px; 
            border: 3px solid #fff; border-radius: 24px; 
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        
        .hint {
            position: absolute; bottom: 120px;
            background: rgba(255,255,255,0.15);
            padding: 12px 24px; border-radius: 20px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            font-size: 16px; font-weight: 500;
        }

        .btn-close {
            position: absolute; top: 50px; right: 20px;
            color: #fff; text-decoration: none; font-size: 18px;
            background: rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 20px;
        }
    </style>
</head>
<body>

    <div id="reader"></div>
    
    <a href="apple_pay.html" class="btn-close">Закрыть</a>

    <div class="overlay">
        <div class="scanner-frame"></div>
        <div class="hint">Наведите на код оплаты</div>
    </div>

    <script>
        const html5QrCode = new Html5Qrcode("reader");

        // Настройка запуска камеры
        const config = { fps: 15, qrbox: { width: 260, height: 260 } };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // Если считали код, останавливаем камеру
                html5QrCode.stop().then(() => {
                    
                    // Проверяем формат кода (ID|СУММА или просто ID)
                    let target, amount;
                    if (decodedText.includes('|')) {
                        [target, amount] = decodedText.split('|');
                    } else {
                        target = decodedText;
                        amount = '';
                    }

                    // ПЕРЕКИДЫВАЕМ НА ТВОЙ ТРАНСФЕР С ЗАПОЛНЕННЫМИ ДАННЫМИ
                    window.location.href = `transfer.html?target=${target}&amount=${amount}`;
                });
            }
        ).catch(err => {
            console.error("Ошибка камеры:", err);
            alert("Камера недоступна. Проверьте разрешения.");
        });
    </script>
</body>
</html>
