<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой QR - Wallet</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; text-align: center;
        }
        .container { background: #1c1c1e; padding: 40px 20px; border-radius: 30px; width: 85%; max-width: 350px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #8e8e93; margin-bottom: 30px; font-size: 14px; }
        
        .qr-wrapper { 
            background: #fff; padding: 15px; border-radius: 20px; 
            display: inline-block; margin-bottom: 20px; min-width: 200px; min-height: 200px;
        }
        #qrImage { width: 200px; height: 200px; display: block; }
        
        .user-id { font-weight: 700; color: #007aff; font-size: 20px; margin-top: 10px; }
        
        .back-btn { 
            display: block; margin-top: 40px; color: #fff; text-decoration: none; 
            background: #333; padding: 15px; border-radius: 14px; 
            font-weight: 600; font-size: 17px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="displayName">Apple Pay</h1>
        <p>Отсканируйте этот код, чтобы перевести деньги на мой аккаунт</p>

        <div class="qr-wrapper">
            <img id="qrImage" src="" alt="Генерация QR...">
        </div>

        <div class="user-id" id="userId">@ID</div>
        
        <a href="apple_pay.html" class="back-btn">Готово</a>
    </div>

    <script>
        const user = localStorage.getItem('walletUser');

        if (!user) {
            window.location.href = 'index.html';
        } else {
            const name = user.charAt(0).toUpperCase() + user.slice(1);
            document.getElementById('displayName').innerText = name;
            document.getElementById('userId').innerText = '@' + user;

            // Кодируем данные: префикс USER: и никнейм
            const qrData = encodeURIComponent("USER:" + user);
            
            // Используем проверенный сервис api.qrserver.com
            // Добавляем параметры цвета (000000) и фона (ffffff) для надежности
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${qrData}&bgcolor=ffffff&color=000000&margin=1`;
            
            const img = document.getElementById('qrImage');
            img.src = qrUrl;

            // Проверка на ошибку загрузки
            img.onerror = function() {
                alert("Ошибка загрузки QR-кода. Проверьте интернет или попробуйте позже.");
                this.alt = "Ошибка загрузки";
            };
        }
    </script>

</body>
</html>
