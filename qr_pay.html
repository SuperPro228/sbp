<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой QR - Wallet</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: -apple-system, sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; text-align: center;
        }
        .container { background: #1c1c1e; padding: 40px 20px; border-radius: 30px; width: 85%; max-width: 350px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: #8e8e93; margin-bottom: 30px; font-size: 16px; }
        
        .qr-wrapper { 
            background: #fff; padding: 15px; border-radius: 20px; 
            display: inline-block; margin-bottom: 20px;
        }
        #qrImage { width: 200px; height: 200px; display: block; }
        
        .user-id { font-weight: 700; color: #007aff; font-size: 20px; margin-top: 10px; }
        
        .back-btn { 
            margin-top: 40px; color: #fff; text-decoration: none; 
            background: #333; padding: 15px 40px; border-radius: 14px; 
            font-weight: 600; width: 100%; box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="displayName">Apple Pay</h1>
        <p>Покажите этот код, чтобы получить перевод на свой аккаунт</p>

        <div class="qr-wrapper">
            <img id="qrImage" src="" alt="QR Code">
        </div>

        <div class="user-id" id="userId">@ID</div>
        
        <a href="apple_pay.html" class="back-btn">Готово</a>
    </div>

    <script>
        // 1. Получаем текущего пользователя
        const user = localStorage.getItem('walletUser');

        if (!user) {
            window.location.href = 'index.html';
        } else {
            // Отображаем имя
            document.getElementById('displayName').innerText = user.charAt(0).toUpperCase() + user.slice(1);
            document.getElementById('userId').innerText = '@' + user;

            // 2. Генерируем ссылку для QR-кода
            // Ссылка будет вести на твой transfer.html с параметром твоего ID
            // Пример: https://твой-сайт.github.io/transfer.html?target=USER:имя
            const currentURL = window.location.origin + window.location.pathname.replace('qr_pay.html', 'transfer.html');
            const payLink = `${currentURL}?target=USER:${user}`;

            // 3. Используем Google Charts API для создания QR
            const qrUrl = `https://chart.googleapis.com/chart?chs=300x300&cht=qr&chl=${encodeURIComponent(payLink)}&choe=UTF-8`;
            
            document.getElementById('qrImage').src = qrUrl;
        }
    </script>

</body>
</html>
