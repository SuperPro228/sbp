<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мой QR - Wallet</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #000; --apple-blue: #007aff; }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: -apple-system, sans-serif; 
            display: flex; flex-direction: column; align-items: center; height: 100vh;
        }

        header { width: 100%; padding: 60px 20px 20px; box-sizing: border-box; }
        .back-btn { color: var(--apple-blue); text-decoration: none; font-size: 17px; display: flex; align-items: center; }

        /* Контейнер для QR */
        .qr-container {
            margin-top: 50px; background: #fff; padding: 20px; border-radius: 24px;
            display: none; /* Скрыт до окончания загрузки */
            animation: qrAppear 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 20px 40px rgba(255,255,255,0.1);
        }
        #qrcode img { border-radius: 10px; }

        h1 { font-size: 28px; font-weight: 700; margin-top: 30px; opacity: 0; animation: fadeIn 0.8s 0.3s forwards; }
        p { color: #8e8e93; font-size: 16px; margin-top: 10px; opacity: 0; animation: fadeIn 0.8s 0.4s forwards; }

        /* Загрузка */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100;
        }
        .spinner {
            width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite;
        }

        /* Анимации */
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes qrAppear {
            0% { transform: scale(0.5); opacity: 0; filter: blur(10px); }
            100% { transform: scale(1); opacity: 1; filter: blur(0); }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .done-btn {
            margin-top: auto; margin-bottom: 50px; background: #1c1c1e;
            color: var(--apple-blue); width: calc(100% - 40px); padding: 18px;
            border-radius: 14px; text-align: center; text-decoration: none;
            font-weight: 600; font-size: 17px; opacity: 0; animation: fadeIn 0.8s 0.6s forwards;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color: #fff; margin-top: 20px; opacity: 1; animation: none;">Создание QR-кода...</p>
    </div>

    <header>
        <a href="apple_pay.html" class="back-btn">‹ Назад</a>
    </header>

    <div class="qr-container" id="qrContainer">
        <div id="qrcode"></div>
    </div>

    <h1 id="userName">Apple ID</h1>
    <p>Покажите этот код для получения перевода</p>

    <a href="apple_pay.html" class="done-btn">Готово</a>

    <script>
        const user = localStorage.getItem('walletUser');
        if (!user) window.location.href = 'index.html';

        document.getElementById('userName').innerText = user.charAt(0).toUpperCase() + user.slice(1);

        // Генерация QR
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "USER:" + user,
            width: 220,
            height: 220,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Имитация загрузки для анимации
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('qrContainer').style.display = 'block';
            }, 1500); // 1.5 секунды на "генерацию"
        };
    </script>
</body>
</html>
