<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Сканирование QR</title>
    <style>
        :root {
            --bg: #000;
            --apple-blue: #007aff;
            --card-gray: #1c1c1e;
        }

        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; height: 100vh;
            display: flex; flex-direction: column;
            animation: fadeIn 0.4s ease;
        }

        header {
            padding: 50px 20px 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10; position: relative;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .back-link { color: var(--apple-blue); text-decoration: none; font-size: 17px; cursor: pointer; }
        
        /* Контейнер сканера */
        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            position: absolute; top: 0; left: 0;
        }

        #reader video {
            object-fit: cover !important;
        }

        /* Рамка фокуса */
        .scanner-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            z-index: 5; pointer-events: none;
        }

        .focus-box {
            width: 250px; height: 250px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 30px;
            position: relative;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }

        .focus-box::before {
            content: ''; position: absolute; top: -2px; left: -2px; width: 254px; height: 254px;
            border: 4px solid var(--apple-blue); border-radius: 30px;
            clip-path: inset(0 80% 80% 0); /* Углы */
        }

        /* Инструкция */
        .hint {
            position: absolute; bottom: 120px; width: 100%;
            text-align: center; color: #fff; font-size: 15px; z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-action {
            position: absolute; bottom: 40px; left: 20px; right: 20px;
            background: #fff; color: #000; border: none; padding: 18px;
            border-radius: 14px; font-weight: 600; font-size: 17px;
            z-index: 10; transition: transform 0.2s;
        }
        .btn-action:active { transform: scale(0.96); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="back-link" onclick="history.back()">Отмена</div>
        <div style="font-weight: 600;">Сканирование</div>
        <div style="width: 50px;"></div>
    </header>

    <div id="reader"></div>

    <div class="scanner-overlay">
        <div class="focus-box"></div>
    </div>

    <div class="hint">Наведите камеру на QR-код карты</div>
    
    <button class="btn-action" id="startBtn" onclick="startScanner()">Включить камеру</button>

    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <script>
        let html5QrCode;

        function startScanner() {
            document.getElementById('startBtn').style.display = 'none';
            
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            // Используем заднюю камеру
            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).catch(err => {
                alert("Ошибка доступа к камере: " + err);
                document.getElementById('startBtn').style.display = 'block';
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Остановка сканера после успешного считывания
            html5QrCode.stop().then(() => {
                // Если в QR зашифрованы 4 цифры карты, передаем их в трансфер
                alert("Карта распознана: " + decodedText);
                
                // Перенаправляем на страницу перевода, прокидывая номер карты в URL
                window.location.href = `transfer.html?target=${decodedText}`;
            });
        }

        // Если зашли и камера не запустилась сама (политика браузеров), жмем кнопку.
        // Но на iOS Safari часто нужно именно нажатие.
    </script>
</body>
</html>
