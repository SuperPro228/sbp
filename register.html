<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Добавить карту - Wallet</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; }
        .cancel { color: #007aff; text-decoration: none; font-size: 17px; }
        h1 { font-size: 32px; margin: 20px 0; text-align: center; }
        
        .input-group { background: #1c1c1e; border-radius: 14px; padding: 5px 15px; margin-top: 20px; }
        .input-row { display: flex; align-items: center; border-bottom: 0.5px solid #333; padding: 10px 0; }
        .input-row:last-child { border: none; }
        label { width: 120px; color: #fff; font-size: 17px; }
        input { 
            flex: 1; background: none; border: none; color: #8e8e93; 
            font-size: 17px; outline: none; text-align: right;
        }
        
        .btn-add { 
            background: #fff; color: #000; border: none; width: 100%; 
            padding: 18px; border-radius: 14px; font-size: 17px; 
            font-weight: 600; margin-top: 40px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="apple_pay.html" class="cancel">Отмена</a>
    </div>

    <h1>Данные карты</h1>

    <div class="input-group">
        <div class="input-row">
            <label>Название</label>
            <input type="text" id="cardName" placeholder="Напр. Tinkoff">
        </div>
        <div class="input-row">
            <label>Номер</label>
            <input type="number" id="cardDigits" placeholder="Последние 4 цифры" oninput="if(this.value.length > 4) this.value = this.value.slice(0,4)">
        </div>
    </div>

    <button class="btn-add" onclick="addCard()">Добавить</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = localStorage.getItem('walletUser');
        if (!user) window.location.href = 'index.html';

        async function addCard() {
            const name = document.getElementById('cardName').value;
            const digits = document.getElementById('cardDigits').value;

            if (!name || digits.length !== 4) {
                alert("Введите название и 4 цифры карты");
                return;
            }

            try {
                // Просто добавляем карту в список пользователя без изменения баланса
                await db.ref('users/' + user + '/cards').push({
                    name: name,
                    digits: digits,
                    timestamp: Date.now()
                });

                window.location.href = 'apple_pay.html';
            } catch (e) {
                alert("Ошибка при добавлении");
            }
        }
    </script>
</body>
</html>
