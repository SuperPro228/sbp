<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Добавление карты</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; padding: 40px 20px; }
        h1 { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 30px; }
        .input-group { background: #1c1c1e; border-radius: 14px; padding: 5px 15px; margin-bottom: 20px; }
        input { 
            width: 100%; background: transparent; border: none; color: #fff; 
            padding: 15px 0; font-size: 17px; outline: none; border-bottom: 0.5px solid #333;
        }
        input:last-child { border: none; }
        .add-btn { 
            width: 100%; background: #fff; color: #000; border: none; padding: 18px; 
            border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; margin-top: 20px;
        }
        .back-btn { display: block; text-align: center; color: #007aff; text-decoration: none; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Новая карта</h1>

    <div class="input-group">
        <input type="text" id="cardName" placeholder="Название (например, Visa)">
        <input type="number" id="cardDigits" placeholder="Последние 4 цифры" oninput="if(this.value.length > 4) this.value = this.value.slice(0, 4)">
        <input type="number" id="cardBalance" placeholder="Начальный баланс">
    </div>

    <button class="add-btn" onclick="addCard()">Добавить в Wallet</button>
    <a href="apple_pay.html" class="back-btn">Отмена</a>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Получаем имя текущего юзера
        const user = localStorage.getItem('walletUser');

        async function addCard() {
            if (!user) {
                alert("Ошибка: вы не авторизованы!");
                window.location.href = 'index.html';
                return;
            }

            const name = document.getElementById('cardName').value;
            const digits = document.getElementById('cardDigits').value;
            const balance = parseFloat(document.getElementById('cardBalance').value) || 0;

            if (!name || digits.length !== 4) {
                alert("Введите название и 4 цифры карты");
                return;
            }

            // КЛЮЧЕВОЕ ИСПРАВЛЕНИЕ: сохраняем ВНУТРЬ юзера
            const newCardRef = db.ref('users/' + user + '/cards').push();
            
            await newCardRef.set({
                name: name,
                digits: digits,
                balance: balance,
                style: 'sapphire-bg' // стиль по умолчанию
            });

            // Также обновляем общий баланс Apple Cash этого юзера
            const userRef = db.ref('users/' + user);
            const snap = await userRef.once('value');
            const currentTotal = snap.val().balance || 0;
            await userRef.update({ balance: currentTotal + balance });

            alert("Карта добавлена!");
            window.location.href = 'apple_pay.html';
        }
    </script>
</body>
</html>
