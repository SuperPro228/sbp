<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Добавить карту</title>
    <style>
        :root { --apple-blue: #007aff; --bg: #000; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: -apple-system, sans-serif; padding: 20px;
            animation: fadeIn 0.5s ease;
        }
        
        .back { color: var(--apple-blue); text-decoration: none; font-size: 17px; display: block; margin-bottom: 20px; }

        /* Анимированное превью карты */
        .card-preview {
            width: 100%; aspect-ratio: 1.58/1; border-radius: 16px; 
            margin: 20px 0 40px; display: flex; align-items: flex-end; padding: 20px;
            box-sizing: border-box; font-weight: 600; font-size: 20px;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: springPop 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .input-group { background: #1c1c1e; border-radius: 14px; padding: 4px 16px; margin-bottom: 25px; }
        .row { border-bottom: 1px solid #2c2c2e; padding: 12px 0; }
        .row:last-child { border: none; }
        label { color: #8e8e93; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select { 
            background: none; border: none; color: #fff; width: 100%; 
            font-size: 17px; outline: none; margin-top: 5px; appearance: none;
        }

        .btn-create { 
            background: #fff; color: #000; width: 100%; padding: 18px; 
            border-radius: 14px; font-weight: 600; font-size: 17px; border: none;
            transition: transform 0.2s; margin-top: 10px;
        }
        .btn-create:active { transform: scale(0.96); opacity: 0.9; }

        /* Градиенты */
        .sapphire-bg { background: linear-gradient(135deg, #0b1a30 0%, #000 100%); }
        .gold-bg { background: linear-gradient(135deg, #d4af37 0%, #8a6d1d 100%); }
        .black-bg { background: #222; border: 1px solid #444; }

        @keyframes springPop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <a href="apple_pay.html" class="back">Отмена</a>
    <h1 style="font-size: 32px; font-weight: 700;">Новая карта</h1>

    <div id="preview" class="card-preview sapphire-bg">CARD NAME</div>

    <div class="input-group">
        <div class="row">
            <label>Название</label>
            <input type="text" id="name" placeholder="Напр. Сбербанк" oninput="updatePreview()">
        </div>
        <div class="row">
            <label>Дизайн</label>
            <select id="style" onchange="updateStyle()">
                <option value="sapphire-bg">Sapphire Blue</option>
                <option value="gold-bg">Gold Edition</option>
                <option value="black-bg">Deep Black</option>
            </select>
        </div>
    </div>

    <button class="btn-create" onclick="saveCard()">Создать карту</button>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        firebase.initializeApp({ databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" });
        
        function updatePreview() {
            const val = document.getElementById('name').value;
            document.getElementById('preview').innerText = val || "CARD NAME";
        }

        function updateStyle() {
            document.getElementById('preview').className = 'card-preview ' + document.getElementById('style').value;
        }

        function saveCard() {
            const n = document.getElementById('name').value;
            const s = document.getElementById('style').value;
            const d = Math.floor(1000 + Math.random() * 9000);
            if(!n) return alert("Введите название");
            
            firebase.database().ref('user_cards').push({
                name: n, style: s, digits: d, balance: 5000 // Стартовый бонус
            }).then(() => location.href = 'apple_pay.html');
        }
    </script>
</body>
</html>
