<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lucky Wallet - Crash</title>
    <style>
        :root { 
            --bg: #0b0b15; /* Глубокий темный фон LuckyJet */
            --apple-blue: #007aff; 
            --apple-red: #ff3b30; 
            --lj-purple: #a634ff; /* Фирменный фиолетовый */
            --lj-gold: #fccb2b; /* Золотой для выигрыша */
            --card-gray: #161622;
        }
        body { 
            margin: 0; background: var(--bg); color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; height: 100vh;
        }

        /* Хедер (сохраняем твой Wallet стиль, меняем цвета) */
        header { padding: 60px 20px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .back-btn { color: #fff; text-decoration: none; font-size: 17px; opacity: 0.8; }
        .balance-info { text-align: right; }
        #balance { font-weight: 700; color: #fff; font-size: 18px; }

        /* Игровая зона (Стиль LuckyJet) */
        .game-area {
            flex: 1; position: relative; margin: 0 10px 10px;
            background: #080810; border-radius: 16px;
            overflow: hidden; display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(166, 52, 255, 0.1);
        }

        /* Canvas для рисования графика (кривой) */
        #chart-canvas {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }

        /* Контейнер Джо */
        #rocket-container {
            position: absolute; bottom: 15%; left: 15%; /* Стартовая позиция */
            z-index: 10; display: none; /* Скрыт изначально */
            transition: transform 0.1s linear;
        }

        /* Сама картинка Джо */
        #rocket-img {
            width: 100px; /* Размер как на скрине */
            filter: drop-shadow(0 0 15px rgba(166, 52, 255, 0.5));
            transform: rotate(-10deg); /* Легкий наклон */
        }

        /* Огненный шлейф (CSS эффект) */
        #rocket-container::after {
            content: ''; position: absolute; bottom: 10px; left: -30px;
            width: 60px; height: 20px;
            background: radial-gradient(circle, #ff6a00 0%, rgba(255,0,0,0) 70%);
            filter: blur(5px); animation: flamePulse 0.1s infinite alternate;
            z-index: -1;
        }

        /* Коэффициент (Крупный, фиолетовый) */
        #multiplier {
            font-size: 80px; font-weight: 900; z-index: 5;
            color: var(--lj-purple); letter-spacing: -3px;
            text-shadow: 0 0 20px rgba(166, 52, 255, 0.7);
            font-variant-numeric: tabular-nums; /* Чтобы цифры не прыгали */
        }

        /* Управление (iOS Style, но в цветах LuckyJet) */
        .controls {
            padding: 20px 15px 40px; background: var(--card-gray);
            border-radius: 20px 20px 0 0; display: flex; flex-direction: column; gap: 12px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-box {
            display: flex; background: #0b0b15; border-radius: 12px; 
            padding: 14px; align-items: center; justify-content: space-between;
        }
        input { 
            background: none; border: none; color: #fff; font-size: 20px; 
            font-weight: 600; outline: none; width: 60%; text-align: right;
        }

        .main-btn {
            padding: 18px; border-radius: 14px; border: none; font-size: 18px; 
            font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-bet { background: var(--lj-purple); color: #fff; }
        .btn-cashout { background: var(--lj-gold); color: #000; }
        .main-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* Анимации */
        @keyframes flamePulse { from { opacity: 0.8; transform: scaleX(1); } to { opacity: 1; transform: scaleX(1.2); } }
        .crash-effect { color: var(--apple-red) !important; text-shadow: 0 0 20px var(--apple-red) !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

    <header>
        <a href="apple_pay.html" class="back-btn">‹ Wallet</a>
        <div class="balance-info">
            <div id="balance">0 ₽</div>
        </div>
    </header>

    <div class="game-area">
        <canvas id="chart-canvas"></canvas>
        <div id="multiplier">x1.00</div>
        <div id="rocket-container">
            <img src="lucky_joe.png" id="rocket-img" alt="LuckyJoe">
        </div>
    </div>

    <div class="controls">
        <div class="input-box">
            <span style="color: #8e8e93;">Ставка</span>
            <input type="number" id="betAmount" value="100" spellcheck="false">
            <span style="margin-left: 5px; font-weight: 600;">₽</span>
        </div>
        <button id="actionBtn" class="main-btn btn-bet" onclick="handleAction()">ПОСТАВИТЬ</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "https://passatpay-c766e-default-rtdb.firebaseio.com/" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = localStorage.getItem('walletUser');
        if (!user) window.location.href = 'index.html';

        let currentBalance = 0;
        let isPlaying = false;
        let currentMultiplier = 1.0;
        let bet = 0;
        let gameLoop;

        // Canvas для графика
        const canvas = document.getElementById('chart-canvas');
        const ctx = canvas.getContext('2d');
        let points = [];

        // Адаптация canvas под размер экрана
        function resizeCanvas() {
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        db.ref('users/' + user).on('value', (snap) => {
            const data = snap.val();
            if (data) {
                currentBalance = parseFloat(data.balance) || 0;
                document.getElementById('balance').innerText = currentBalance.toLocaleString() + ' ₽';
            }
        });

        const actionBtn = document.getElementById('actionBtn');
        const multDisplay = document.getElementById('multiplier');
        const rocketCont = document.getElementById('rocket-container');
        const rocketImg = document.getElementById('rocket-img');

        function handleAction() {
            if (!isPlaying) startRound();
            else cashOut();
        }

        async function startRound() {
            const amount = parseInt(document.getElementById('betAmount').value);
            if (isNaN(amount) || amount <= 0 || amount > currentBalance) return alert("Проверь ставку!");

            bet = amount;
            isPlaying = true;
            currentMultiplier = 1.0;
            points = []; // Сброс графика
            
            await db.ref('users/' + user).update({ balance: currentBalance - bet });

            // UI
            actionBtn.innerText = "ЗАБРАТЬ";
            actionBtn.className = "main-btn btn-cashout";
            multDisplay.classList.remove('crash-effect');
            multDisplay.style.color = "var(--lj-purple)";
            rocketCont.style.display = "block";
            rocketImg.style.filter = "drop-shadow(0 0 15px rgba(166, 52, 255, 0.5))";

            // Математика краша
            const crashPoint = (1 / (1 - Math.random() * 0.99)).toFixed(2); 

            gameLoop = setInterval(() => {
                currentMultiplier += 0.01 + (currentMultiplier * 0.003); // Чуть медленнее рост для красоты графика
                multDisplay.innerText = 'x' + currentMultiplier.toFixed(2);

                // Расчет позиции (прогресс)
                const progress = Math.min(currentMultiplier / 15, 1);
                const startX = canvas.width * 0.15;
                const startY = canvas.height * 0.85;
                const endX = canvas.width * 0.85;
                const endY = canvas.height * 0.15;

                const currentX = startX + (endX - startX) * progress;
                const currentY = startY - (startY - endY) * progress;

                // Двигаем Джо
                rocketCont.style.transform = `translate(${currentX - startX}px, ${currentY - startY}px)`;

                // Рисуем график (кривую)
                drawChart(currentX, currentY);

                if (currentMultiplier >= crashPoint) doCrash();
            }, 100);
        }

        function drawChart(currX, currY) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Добавляем текущую точку
            points.push({x: currX, y: currY});

            if (points.length < 2) return;

            // Настройки линии (как в LuckyJet)
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#a634ff'; // Фиолетовая линия
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(166, 52, 255, 0.5)';

            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);

            // Рисуем кривую через точки
            for (let i = 1; i < points.length; i++) {
                // Используем кривые Безье для плавности
                const xc = (points[i].x + points[i-1].x) / 2;
                const yc = (points[i].y + points[i-1].y) / 2;
                ctx.quadraticCurveTo(points[i-1].x, points[i-1].y, xc, yc);
            }
            ctx.stroke();
            ctx.shadowBlur = 0; // Сброс тени
        }

        function doCrash() {
            clearInterval(gameLoop);
            isPlaying = false;
            multDisplay.innerText = "УЛЕТЕЛ!";
            multDisplay.classList.add('crash-effect');
            
            // Эффект исчезновения Джо (краснеет и растворяется)
            rocketImg.style.filter = "brightness(0.5) sepia(1) hue-rotate(-70deg) saturate(6)";
            rocketCont.style.transition = "opacity 1s, transform 1s";
            rocketCont.style.opacity = "0";
            rocketCont.style.transform += " scale(0.5)";

            setTimeout(() => {
                resetGame();
            }, 2500);
        }

        async function cashOut() {
            if (!isPlaying) return;
            clearInterval(gameLoop);
            
            const win = Math.floor(bet * currentMultiplier);
            await db.ref('users/' + user).update({ balance: currentBalance + win });
            
            alert(`Выигрыш: ${win} ₽!`);
            isPlaying = false;
            resetGame();
        }

        function resetGame() {
            actionBtn.innerText = "ПОСТАВИТЬ";
            actionBtn.className = "main-btn btn-bet";
            multDisplay.innerText = "x1.00";
            multDisplay.style.color = "var(--lj-purple)";
            rocketCont.style.display = "none";
            rocketCont.style.opacity = "1";
            rocketCont.style.transition = "transform 0.1s linear"; // Сброс transition
            rocketCont.style.transform = "translate(0,0)";
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Очистка графика
        }
    </script>
</body>
</html>
